<!DOCTYPE html>
<html>
<head>
  <title>Prius.az</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f3f5;
    }

    /* TOP BAR */
    .topbar {
      background: #111;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    /* FILTER */
    .filter {
      padding: 15px;
      background: white;
      text-align: center;
    }

    select {
      padding: 8px;
      margin: 5px;
    }

    /* CAR LIST */
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    .card {
      width: 250px;
      background: white;
      margin: 10px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .info {
      padding: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    /* POPUP */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
    }

    .popup-box {
      background: white;
      width: 320px;
      margin: 8% auto;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">Prius.az</div>
  <div>Yalnız Prius 2011-2015</div>
</div>

<!-- FILTER -->
<div class="filter">
  <select id="yearFilter" onchange="filterCars()">
    <option value="all">Bütün illər</option>
    <option value="2011">2011</option>
    <option value="2013">2013</option>
    <option value="2015">2015</option>
  </select>
</div>

<!-- CARS -->
<div class="container">

  <div class="card" data-year="2011" onclick="openPopup('Prius 2011','8500$','Yaxşı vəziyyət, az sürülüb','https://images.unsplash.com/photo-1503376780353-7e6692767b70')">
    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
    <div class="info">
      <h3>Prius 2011</h3>
      <p class="price">8500$</p>
    </div>
  </div>

  <div class="card" data-year="2013" onclick="openPopup('Prius 2013','9500$','Ekonom, ideal vəziyyət','https://images.unsplash.com/photo-1494905998402-395d579af36f')">
    <img src="https://images.unsplash.com/photo-1494905998402-395d579af36f">
    <div class="info">
      <h3>Prius 2013</h3>
      <p class="price">9500$</p>
    </div>
  </div>

  <div class="card" data-year="2015" onclick="openPopup('Prius 2015','11000$','Full vəziyyət, təmiz maşın','https://images.unsplash.com/photo-1511910849309-0dffb8785146')">
    <img src="https://images.unsplash.com/photo-1511910849309-0dffb8785146">
    <div class="info">
      <h3>Prius 2015</h3>
      <p class="price">11000$</p>
    </div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="title"></h2>
    <p id="price"></p>
    <p id="desc"></p>
    <button onclick="closePopup()">Bağla</button>
  </div>
</div>

<script>
function openPopup(title, price, desc, img) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("title").innerText = title;
  document.getElementById("price").innerText = "Qiymət: " + price;
  document.getElementById("desc").innerText = desc;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function filterCars() {
  let value = document.getElementById("yearFilter").value;
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    if (value === "all" || card.getAttribute("data-year") === value) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
