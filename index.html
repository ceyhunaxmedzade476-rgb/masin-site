<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Prius (2011-2015)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffffff, #d4eaf5);
            color: #333333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #1b4b6b;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1rem;
            color: #555;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            position: relative;
            padding-top: 66.66%; /* 3:2 Aspect Ratio */
            background-color: #f9f9f9;
        }

        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* şəkillərin kənarını doldurması üçün */
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 30px 20px 20px;
            color: #fff;
            text-align: left;
            pointer-events: none;
        }

        .item-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 999; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #fff;
            margin: auto;
            padding: 0;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        .close {
            color: #fff;
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        .close:hover {
            color: #ffd700;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .modal-body {
                flex-direction: row;
            }
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        @media (min-width: 768px) {
            .modal-image {
                width: 50%;
                height: 400px;
            }
        }

        .modal-details {
            padding: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .modal-details {
                width: 50%;
            }
        }

        .modal-details h2 {
            font-size: 1.8rem;
            color: #1b4b6b;
            margin-bottom: 10px;
        }

        .modal-price {
            font-size: 1.6rem;
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal-info {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 25px;
        }

        .modal-info span {
            font-weight: bold;
            color: #333;
        }

        .modal-btn {
            padding: 12px 24px;
            background-color: #1b4b6b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            text-align: center;
        }

        .modal-btn:hover {
            background-color: #12344d;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Toyota Prius (2011-2015)</h1>

        <div class="gallery-item" onclick="openModal(this)" data-title="Toyota Prius 2013" data-price="14,100 AZN" data-info="<span>Mühərrik:</span> 1.8L Hibrid<br><span>İl:</span> 2013<br><span>Yanacaq:</span> 4.0L / 100km<br><span>Rəng:</span> Qırmızı Tünd<br><br>Full komplektasiyadır. Dəri salon və arxa görüntü kamerası mövcuddur." data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/2010_Toyota_Prius.jpg/800px-2010_Toyota_Prius.jpg">

        <div class="gallery-item" onclick="openModal(this)" data-title="Toyota Prius 2014" data-price="15,000 AZN" data-info="<span>Mühərrik:</span> 1.8L Hibrid<br><span>İl:</span> 2014<br><span>Yanacaq:</span> 4.1L / 100km<br><span>Rəng:</span> Ağ<br><br>Təmiz və ideal vəziyyətdə. Heç bir xərc tələb etmir." data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Toyota_Prius_III.jpg/800px-Toyota_Prius_III.jpg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Toyota_Prius_III.jpg/800px-Toyota_Prius_III.jpg" alt="Toyota Prius 2014">

            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/2012_Toyota_Prius_v_--_04-18-2012.JPG/800px-2012_Toyota_Prius_v_--_04-18-2012.JPG" alt="Toyota Prius 2015">
            <div class="item-info">

        <!-- İtem 6 -->
        <div class="gallery-item" onclick="openModal(this)" data-title="Toyota Prius Plug-in 2013" data-price="14,800 AZN" data-info="<span>Mühərrik:</span> 1.8L Hibrid (Plug-in)<br><span>İl:</span> 2013<br><span>Yanacaq:</span> 2.5L / 100km<br><span>Rəng:</span> Gümüşü<br><br>Ev şəraitində tokla zaryadka etmək imkanı. Super qənaətcil." data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Toyota_Prius_Plug-in_Hybrid_--_03-21-2012.JPG/800px-Toyota_Prius_Plug-in_Hybrid_--_03-21-2012.JPG">

    <!-- Modal (Popup Pəncərəsi) -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImg" class="modal-image" src="" alt="Prius">
                <div class="modal-details">
                    <h2 id="modalTitle">Maşın Adı</h2>
                    <div id="modalPrice" class="modal-price">Qiymət</div>
                    <div id="modalInfo" class="modal-info">
                        Məlumatlar
                    </div>
                    <button class="modal-btn" onclick="alert('Satış təmsilçisi ilə əlaqə yaradılır...')">Əlaqə saxla</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Kodu -->
    <script>
        var modal = document.getElementById("myModal");

        function openModal(element) {
            // Şəklin url, başlıq, qiymət və məlumatlarını HTML teqindən alırıq
            var imgUrl = element.getAttribute("data-img");
            var title = element.getAttribute("data-title");
            var price = element.getAttribute("data-price");
            var info = element.getAttribute("data-info");

            // Modalın içinə yazırıq
            document.getElementById("modalImg").src = imgUrl;
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalPrice").innerText = price;
            document.getElementById("modalInfo").innerHTML = info;

            // Modalı açırıq
            modal.style.display = "flex";
            setTimeout(function() {
                modal.classList.add("show");
            }, 10);
        }

        function closeModal() {
            modal.classList.remove("show");
            setTimeout(function() {
                modal.style.display = "none";
            }, 300); // 0.3 saniyəlik bağlanma effekti
        }

        // Qırağa basanda bağlansın
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
