<!DOCTYPE html>
<html>
<head>
  <title>Prius Elanları</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .car {
      display: inline-block;
      margin: 15px;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .car:hover {
      transform: scale(1.05);
    }

    .car img {
      width: 250px;
      border-radius: 10px;
    }

    /* popup */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .popup-content {
      background: white;
      color: black;
      width: 320px;
      margin: 10% auto;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Prius Elanları (2011 - 2015)</h1>

<!-- MAŞINLAR -->
<div class="car" onclick="openPopup('Prius 2011', '8500$', '2011 model, yaxşı vəziyyət, az sürülüb')">
  <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
  <h3>Prius 2011</h3>
  <p>8500$</p>
</div>

<div class="car" onclick="openPopup('Prius 2013', '9500$', '2013 model, ekonom maşın, ideal vəziyyət')">
  <img src="https://images.unsplash.com/photo-1494905998402-395d579af36f">
  <h3>Prius 2013</h3>
  <p>9500$</p>
</div>

<div class="car" onclick="openPopup('Prius 2015', '11000$', '2015 model, full vəziyyət, təmiz maşın')">
  <img src="https://images.unsplash.com/photo-1511910849309-0dffb8785146">
  <h3>Prius 2015</h3>
  <p>11000$</p>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2 id="title"></h2>
    <p id="price"></p>
    <p id="desc"></p>
    <button onclick="closePopup()">Bağla</button>
  </div>
</div>

<script>
function openPopup(title, price, desc) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("title").innerText = title;
  document.getElementById("price").innerText = "Qiymət: " + price;
  document.getElementById("desc").innerText = desc;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
