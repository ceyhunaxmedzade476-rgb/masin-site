<!DOCTYPE html>
<html>
<head>
  <title>Prius Elanları</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    select {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
    }

    .container {
      padding: 10px;
    }

    .car {
      display: inline-block;
      margin: 15px;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .car:hover {
      transform: scale(1.05);
    }

    .car img {
      width: 250px;
      border-radius: 10px;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .popup-content {
      background: white;
      color: black;
      width: 320px;
      margin: 10% auto;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Prius Elanları</h1>

<!-- FILTER -->
<select id="filter" onchange="filterCars()">
  <option value="all">Hamısı</option>
  <option value="2011">2011</option>
  <option value="2013">2013</option>
  <option value="2015">2015</option>
</select>

<div class="container">

  <div class="car" data-year="2011" onclick="openPopup('Prius 2011','8500$','Yaxşı vəziyyət','https://images.unsplash.com/photo-1503376780353-7e6692767b70')">
    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
    <h3>Prius 2011</h3>
    <p>8500$</p>
  </div>

  <div class="car" data-year="2013" onclick="openPopup('Prius 2013','9500$','Ekonom və ideal','https://images.unsplash.com/photo-1494905998402-395d579af36f')">
    <img src="https://images.unsplash.com/photo-1494905998402-395d579af36f">
    <h3>Prius 2013</h3>
    <p>9500$</p>
  </div>

  <div class="car" data-year="2015" onclick="openPopup('Prius 2015','11000$','Full vəziyyət','https://images.unsplash.com/photo-1511910849309-0dffb8785146')">
    <img src="https://images.unsplash.com/photo-1511910849309-0dffb8785146">
    <h3>Prius 2015</h3>
    <p>11000$</p>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2 id="title"></h2>
    <p id="price"></p>
    <p id="desc"></p>
    <button onclick="closePopup()">Bağla</button>
  </div>
</div>

<script>
function openPopup(title, price, desc, img) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("title").innerText = title;
  document.getElementById("price").innerText = "Qiymət: " + price;
  document.getElementById("desc").innerText = desc;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function filterCars() {
  let value = document.getElementById("filter").value;
  let cars = document.querySelectorAll(".car");

  cars.forEach(car => {
    if (value === "all") {
      car.style.display = "inline-block";
    } else {
      if (car.getAttribute("data-year") === value) {
        car.style.display = "inline-block";
      } else {
        car.style.display = "none";
      }
    }
  });
}
</script>

</body>
</html>
