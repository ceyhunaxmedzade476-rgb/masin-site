<!DOCTYPE html>
<html>
<head>
  <title>Maşın Satışı</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .car {
      display: inline-block;
      margin: 15px;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .car:hover {
      transform: scale(1.05);
    }

    .car img {
      width: 250px;
      border-radius: 10px;
    }

    /* popup */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .popup-content {
      background: #fff;
      color: black;
      width: 300px;
      margin: 10% auto;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Prius Maşınları</h1>

<div class="car" onclick="openPopup('Prius 2018', '12000$', 'Az sürülüb, ideal vəziyyət', 'https://images.unsplash.com/photo-1494905998402-395d579af36f')">
  <img src="https://images.unsplash.com/photo-1494905998402-395d579af36f">
  <h3>Prius 2018</h3>
  <p>12000$</p>
</div>

<div class="car" onclick="openPopup('Prius 2016', '10500$', 'Yaxşı vəziyyətdə', 'https://images.unsplash.com/photo-1503376780353-7e6692767b70')">
  <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
  <h3>Prius 2016</h3>
  <p>10500$</p>
</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2 id="title"></h2>
    <img id="img" width="100%">
    <p id="price"></p>
    <p id="desc"></p>
    <button onclick="closePopup()">Bağla</button>
  </div>
</div>

<script>
function openPopup(title, price, desc, img) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("title").innerText = title;
  document.getElementById("price").innerText = price;
  document.getElementById("desc").innerText = desc;
  document.getElementById("img").src = img;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
