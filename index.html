<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Prius (2011-2015)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #e0e0e0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            position: relative;
            padding-top: 66.66%; /* 3:2 Aspect Ratio */
        }

        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 30px 20px 20px;
            color: #fff;
            text-align: left;
            pointer-events: none; /* Mouse ile seklin ustune gelende problem olmamasi ucun */
        }

        .item-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4CAF50; /* Qiymeti daha da nezere carpan yasil reng */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Toyota Prius (2011-2015)</h1>
    </header>

    <div class="gallery">
        <!-- İtem 1 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1590362891991-f76150b0cd9f?auto=format&fit=crop&w=600&q=80" alt="Toyota Prius 2011">
            <div class="item-info">
                <h3>Toyota Prius 2011</h3>
                <p class="price">12,500 AZN</p>
            </div>
        </div>
        <!-- İtem 2 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1621007947382-bb3c3994e3fd?auto=format&fit=crop&w=600&q=80" alt="Toyota Prius 2012">
            <div class="item-info">
                <h3>Toyota Prius 2012</h3>
                <p class="price">13,200 AZN</p>
            </div>
        </div>
        <!-- İtem 3 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1609521263047-f8f205293f24?auto=format&fit=crop&w=600&q=80" alt="Toyota Prius 2013">
            <div class="item-info">
                <h3>Toyota Prius 2013</h3>
                <p class="price">14,100 AZN</p>
            </div>
        </div>
        <!-- İtem 4 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&w=600&q=80" alt="Toyota Prius 2014">
            <div class="item-info">
                <h3>Toyota Prius 2014</h3>
                <p class="price">15,000 AZN</p>
            </div>
        </div>
        <!-- İtem 5 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1616423640778-28d1b53229bd?auto=format&fit=crop&w=600&q=80" alt="Toyota Prius 2015">
            <div class="item-info">
                <h3>Toyota Prius 2015</h3>
                <p class="price">16,500 AZN</p>
            </div>
        </div>
        <!-- İtem 6 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=600&q=80" alt="Toyota Prius 2013">
            <div class="item-info">
                <h3>Toyota Prius 2013</h3>
                <p class="price">13,800 AZN</p>
            </div>
        </div>
    </div>

</body>
</html>
